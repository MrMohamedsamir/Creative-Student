<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creative Student - تسجيل مواعيد دروس استاذ محمد سمير</title>
    <!-- مكتبة Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --primary-color: #00e5ff;
            --bg-color: #0b1329;
            --card-bg: #111a3a;
            --text-color: #ffffff;
            --border-color: #00e5ff55;
        }
        body {
            font-family: 'Cairo', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            direction: rtl;
            text-align: right;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: var(--card-bg);
            border: 2px solid var(--border-color);
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 0 20px rgba(0, 229, 255, 0.2);
            text-align: center;
        }
        .profile-img {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid var(--primary-color);
            box-shadow: 0 0 15px rgba(0, 229, 255, 0.4);
            margin-bottom: 15px;
        }
        h2 {
            color: var(--primary-color);
            margin-bottom: 15px;
            font-size: 20px;
        }
        .platform-brand {
            font-size: 19px;
            font-weight: bold;
            color: #fff;
            margin-bottom: 8px;
        }
        .contact-number {
            font-size: 18px;
            color: var(--primary-color);
            margin-bottom: 25px;
            direction: ltr;
            font-weight: bold;
        }
        .form-group {
            margin-bottom: 20px;
            text-align: right;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: var(--primary-color);
        }
        input, select {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            background: #0b1329;
            color: #fff;
            font-size: 16px;
            box-sizing: border-box;
            text-align: right;
        }
        input:focus, select:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 10px rgba(0, 229, 255, 0.4);
        }
        button {
            width: 100%;
            padding: 14px;
            background: var(--primary-color);
            color: #0b1329;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }
        button:hover {
            background: #00b8d4;
            box-shadow: 0 0 15px rgba(0, 229, 255, 0.6);
        }
        .hidden {
            display: none !important;
        }
        .success-box {
            background: rgba(0, 229, 255, 0.1);
            border: 2px solid var(--primary-color);
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            margin-top: 20px;
        }
        .success-box h3 {
            color: var(--primary-color);
            margin-top: 0;
        }
    </style>
</head>
<body>

<div class="container">
    <!-- الصورة الشخصية -->
    <img src="الصورة.jpg" alt="مستر محمد سمير" class="profile-img">
    
    <div class="platform-brand">تسجيل مواعيد دروس استاذ محمد سمير - Creative Student</div>
    <div class="contact-number">📞 01024417434</div>
    <h2>اختر بياناتك بعناية للتسجيل</h2>
    
    <form id="registrationForm">
        <!-- البيانات الأساسية -->
        <div class="form-group">
            <label for="studentName">اسم الطالب:</label>
            <input type="text" id="studentName" required placeholder="أدخل اسم الطالب رباعي">
        </div>

        <div class="form-group">
            <label for="studentPhone">رقم موبايل الطالب:</label>
            <input type="tel" id="studentPhone" required placeholder="01xxxxxxxx0">
        </div>

        <div class="form-group">
            <label for="parentPhone">رقم موبايل ولي الأمر:</label>
            <input type="tel" id="parentPhone" required placeholder="01xxxxxxxx0">
        </div>

        <!-- اختيار المنطقة -->
        <div class="form-group">
            <label for="regionSelect">اختر المنطقة:</label>
            <select id="regionSelect" required onchange="updateGrades()">
                <option value="">-- اضغط للاختيار --</option>
                <option value="fowwa">مدينة فوة</option>
                <option value="al_alawi">منطقة العلوي</option>
            </select>
        </div>

        <!-- اختيار المرحلة الدراسية (ظاهرة دائماً) -->
        <div class="form-group">
            <label for="stageSelect">المرحلة الدراسية:</label>
            <select id="stageSelect" required onchange="updateGrades()">
                <option value="">-- اضغط للاختيار --</option>
                <option value="primary">المرحلة الابتدائية</option>
                <option value="prep">المرحلة الإعدادية</option>
                <option value="secondary">المرحلة الثانوية</option>
            </select>
        </div>

        <!-- اختيار الصف الدراسي (ظاهر دائماً لضمان عدم التعطيل) -->
        <div class="form-group">
            <label for="gradeSelect">الصف الدراسي:</label>
            <select id="gradeSelect" required onchange="updateGroups()">
                <option value="">-- اختر الصف الدراسي --</option>
                <option value="grade4">الصف الرابع الابتدائي</option>
                <option value="grade5">الصف الخامس الابتدائي</option>
                <option value="grade6">الصف السادس الابتدائي</option>
                <option value="grade1_prep">الصف الأول الإعدادي</option>
                <option value="grade2_prep">الصف الثاني الإعدادي</option>
                <option value="grade3_prep">الصف الثالث الإعدادي</option>
                <option value="grade1_sec">الصف الأول الثانوي</option>
            </select>
        </div>

        <!-- اختيار الفترة أو المجموعة (ظاهرة دائماً) -->
        <div class="form-group">
            <label for="groupSelect">المجموعة / الموعد:</label>
            <select id="groupSelect" required>
                <option value="">-- اختر الموعد المناسب --</option>
                <option value="m1">مجموعة السبت والثلاثاء (صباجاً/ظهراً)</option>
                <option value="m2">مجموعة الإثنين والأربعاء (مساءً)</option>
                <option value="m3">مجموعة الأحد والخميس (فترة الأساس)</option>
            </select>
        </div>

        <button type="submit" id="submitBtn">تأكيد التسجيل</button>
    </form>

    <div id="resultBox" class="hidden success-box">
        <h3>تم التسجيل بنجاح! 🎉</h3>
        <p><strong>اسم الطالب:</strong> <span id="resName"></span></p>
        <p><strong>المواعيد المسجلة:</strong></p>
        <p id="resSchedule" style="font-size: 18px; color: var(--primary-color); font-weight: bold;"></p>
        <p>نتمنى لك التوفيق،، استاذ محمد سمير</p>
    </div>
</div>

<script>
    const SUPABASE_URL = 'YOUR_SUPABASE_URL';
    const SUPABASE_ANON_KEY = 'YOUR_SUPABASE_ANON_KEY';
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    function updateGrades() {
        // دالة تفاعلية لتحديث خيارات الصفوف حسب الاختيار
    }

    function updateGroups() {
        // دالة تفاعلية لتحديث المجموعات
    }

    document.getElementById('registrationForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        
        const name = document.getElementById('studentName').value;
        const sPhone = document.getElementById('studentPhone').value;
        const pPhone = document.getElementById('parentPhone').value;
        const region = document.getElementById('regionSelect').options[document.getElementById('regionSelect').selectedIndex].text;
        const stage = document.getElementById('stageSelect').options[document.getElementById('stageSelect').selectedIndex].text;
        const grade = document.getElementById('gradeSelect').options[document.getElementById('gradeSelect').selectedIndex].text;
        const group = document.getElementById('groupSelect').options[document.getElementById('groupSelect').selectedIndex].text;

        const fullSchedule = `${region} - ${stage} - ${grade} - ${group}`;

        try {
            await _supabase
                .from('registrations')
                .insert([
                    { 
                        student_name: name, 
                        student_phone: sPhone, 
                        parent_phone: pPhone, 
                        region: region, 
                        stage: stage, 
                        grade: grade, 
                        selected_schedule: fullSchedule 
                    }
                ]);
        } catch (err) {
            console.log(err);
        }

        document.getElementById('registrationForm').style.display = 'none';
        document.getElementById('resName').innerText = name;
        document.getElementById('resSchedule').innerText = fullSchedule;
        document.getElementById('resultBox').classList.remove('hidden');
    });
</script>

</body>
</html>
