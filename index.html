<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة مستر محمد سمير - تسجيل الحجوزات</title>
    <!-- مكتبة Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --primary-color: #00e5ff;
            --bg-color: #0b1329;
            --card-bg: #111a3a;
            --text-color: #ffffff;
            --border-color: #00e5ff55;
        }
        body {
            font-family: 'Cairo', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            direction: rtl;
            text-align: right;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: var(--card-bg);
            border: 2px solid var(--border-color);
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 0 20px rgba(0, 229, 255, 0.2);
        }
        h2 {
            text-align: center;
            color: var(--primary-color);
            margin-bottom: 25px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: var(--primary-color);
        }
        input, select {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            background: #0b1329;
            color: #fff;
            font-size: 16px;
            box-sizing: border-box;
        }
        input:focus, select:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 10px rgba(0, 229, 255, 0.4);
        }
        button {
            width: 100%;
            padding: 14px;
            background: var(--primary-color);
            color: #0b1329;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }
        button:hover {
            background: #00b8d4;
            box-shadow: 0 0 15px rgba(0, 229, 255, 0.6);
        }
        .hidden {
            display: none;
        }
        .success-box {
            background: rgba(0, 229, 255, 0.1);
            border: 2px solid var(--primary-color);
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            margin-top: 20px;
        }
        .success-box h3 {
            color: var(--primary-color);
            margin-top: 0;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>تسجيل مواعيد الدروس - مستر محمد سمير</h2>
    
    <form id="registrationForm">
        <!-- البيانات الأساسية -->
        <div class="form-group">
            <label for="studentName">اسم الطالب:</label>
            <input type="text" id="studentName" required placeholder="أدخل اسم الطالب رباعي">
        </div>

        <div class="form-group">
            <label for="studentPhone">رقم موبايل الطالب:</label>
            <input type="tel" id="studentPhone" required placeholder="01xxxxxxxx0">
        </div>

        <div class="form-group">
            <label for="parentPhone">رقم موبايل ولي الأمر:</label>
            <input type="tel" id="parentPhone" required placeholder="01xxxxxxxx0">
        </div>

        <!-- اختيار المنطقة -->
        <div class="form-group">
            <label for="regionSelect">اختر المنطقة:</label>
            <select id="regionSelect" required onchange="updateStages()">
                <option value="">-- اضغط للاختيار --</option>
                <option value="fowwa">مدينة فوة</option>
                <option value="al_alawi">منطقة العلوي</option>
            </select>
        </div>

        <!-- اختيار المرحلة الدراسية -->
        <div class="form-group hidden" id="stageGroup">
            <label for="stageSelect">المرحلة الدراسية:</label>
            <select id="stageSelect" required onchange="updateGrades()">
                <option value="">-- اضغط للاختيار --</option>
                <option value="primary">المرحلة الابتدائية</option>
                <option value="prep">المرحلة الإعدادية</option>
                <option value="secondary" id="secOption">المرحلة الثانوية</option>
            </select>
        </div>

        <!-- اختيار الصف الدراسي -->
        <div class="form-group hidden" id="gradeGroup">
            <label for="gradeSelect">الصف الدراسي:</label>
            <select id="gradeSelect" required onchange="updateGroups()">
                <option value="">-- اضغط للاختيار --</option>
            </select>
        </div>

        <!-- اختيار الفترة أو المجموعة -->
        <div class="form-group hidden" id="groupSelectionGroup">
            <label for="groupSelect">المجموعة / الموعد:</label>
            <select id="groupSelect" required>
                <option value="">-- اضغط للاختيار --</option>
            </select>
        </div>

        <button type="submit" id="submitBtn">تأكيد التسجيل</button>
    </form>

    <div id="resultBox" class="hidden success-box">
        <h3>تم التسجيل بنجاح! 🎉</h3>
        <p><strong>اسم الطالب:</strong> <span id="resName"></span></p>
        <p><strong>مواعيدك الخاصة:</strong></p>
        <p id="resSchedule" style="font-size: 18px; color: var(--primary-color); font-weight: bold;"></p>
        <p>نتمنى لك التوفيق،، مستر محمد سمير</p>
    </div>
</div>

<script>
    // إعدادات اتصال Supabase الخاص بك (ضع بياناتك هنا)
    const SUPABASE_URL = 'YOUR_SUPABASE_URL';
    const SUPABASE_ANON_KEY = 'YOUR_SUPABASE_ANON_KEY';
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // بيانات المواعيد دقيقة حسب المكتوب تماماً
    const scheduleData = {
        fowwa: {
            primary: {
                grade4: [
                    { name: "المجموعة (1) - الفترة الصباحية (السبت والثلاثاء 3:00 م)", schedule: "السبت والثلاثاء — 3:00 عصراً" },
                    { name: "المجموعة (2) - الفترة المسائية (الإثنين والأربعاء 6:00 م)", schedule: "الإثنين والأربعاء — 6:00 مساءً" }
                ],
                grade5: [
                    { name: "المجموعة (1) - الفترة الصباحية (السبت والثلاثاء 4:00 م)", schedule: "السبت والثلاثاء — 4:00 عصراً" },
                    { name: "المجموعة (2) - الفترة المسائية (الإثنين والأربعاء 5:00 م)", schedule: "الإثنين والأربعاء — 5:00 عصراً" }
                ],
                grade6: [
                    { name: "المجموعة (1) - الفترة الصباحية (السبت والثلاثاء 2:00 م)", schedule: "السبت والثلاثاء — 2:00 ظهراً" },
                    { name: "المجموعة (2) - الفترة المسائية (الإثنين والأربعاء 7:00 م)", schedule: "الإثنين والأربعاء — 7:00 مساءً" }
                ]
            },
            prep: {
                grade1: [
                    { name: "مجموعة البنات (السبت والثلاثاء 6:00 م)", schedule: "السبت والثلاثاء — 6:00 مساءً (بنات)" },
                    { name: "مجموعة البنين (السبت والثلاثاء 7:00 م)", schedule: "السبت والثلاثاء — 7:00 مساءً (بنين)" }
                ],
                grade2: [
                    { name: "مجموعة البنات (السبت والثلاثاء 5:00 م)", schedule: "السبت والثلاثاء — 5:00 عصراً (بنات)" },
                    { name: "مجموعة البنين (السبت والثلاثاء 8:00 م)", schedule: "السبت والثلاثاء — 8:00 مساءً (بنين)" }
                ],
                grade3: [
                    { name: "المجموعة العامة (السبت 12:00 م | الإثنين والأربعاء 3:00 م)", schedule: "السبت 12:00 ظهراً | الإثنين والأربعاء 3:00 عصراً" }
                ]
            },
            secondary: {
                grade1: [
                    { name: "ننتظر مناهج الصف الأول الثانوي لتحديد المواعيد", schedule: "ننتظر مناهج الصف الأول الثانوي لتحديد المواعيد" }
                ]
            }
        },
        al_alawi: {
            primary: {
                grade4: [
                    { name: "الصف الرابع الابتدائي (الأحد والخميس 2:00 م)", schedule: "الأحد والخميس — 2:00 ظهراً" }
                ],
                grade5: [
                    { name: "الصف الخامس الابتدائي (الأحد والخميس 3:00 م)", schedule: "الأحد والخميس — 3:00 عصراً" }
                ],
                grade6: [
                    { name: "الصف السادس الابتدائي (الأحد والخميس 4:00 م)", schedule: "الأحد والخميس — 4:00 عصراً" }
                ]
            },
            prep: {
                grade1: [
                    { name: "الصف الأول الإعدادي (الأحد والخميس 5:00 م)", schedule: "الأحد والخميس — 5:00 عصراً" }
                ]
            }
        }
    };

    function updateStages() {
        const region = document.getElementById('regionSelect').value;
        const stageGroup = document.getElementById('stageGroup');
        const secOption = document.getElementById('secOption');
        
        document.getElementById('gradeGroup').classList.add('hidden');
        document.getElementById('groupSelectionGroup').classList.add('hidden');

        if (region) {
            stageGroup.classList.remove('hidden');
            if (region === 'al_alawi') {
                secOption.style.display = 'none'; // العلوي ليس به ثانوي في اللوحة
            } else {
                secOption.style.display = 'block';
            }
        } else {
            stageGroup.classList.add('hidden');
        }
    }

    function updateGrades() {
        const region = document.getElementById('regionSelect').value;
        const stage = document.getElementById('stageSelect').value;
        const gradeSelect = document.getElementById('gradeSelect');
        const gradeGroup = document.getElementById('gradeGroup');
        
        document.getElementById('groupSelectionGroup').classList.add('hidden');
        gradeSelect.innerHTML = '<option value="">-- اضغط للاختيار --</option>';

        if (stage && scheduleData[region][stage]) {
            gradeGroup.classList.remove('hidden');
            const grades = scheduleData[region][stage];
            
            for (let g in grades) {
                let gradeName = "";
                if(g === 'grade4') gradeName = "الصف الرابع الابتدائي";
                if(g === 'grade5') gradeName = "الصف الخامس الابتدائي";
                if(g === 'grade6') gradeName = "الصف السادس الابتدائي";
                if(g === 'grade1') gradeName = (stage === 'primary') ? "الصف الرابع الابتدائي" : (stage === 'prep' ? "الصف الأول الإعدادي" : "الصف الأول الثانوي");
                if(g === 'grade2') gradeName = "الصف الثاني الإعدادي";
                if(g === 'grade3') gradeName = "الصف الثالث الإعدادي";

                // تصحيح التسميات حسب المرحلة
                if(stage === 'primary') {
                    if(g === 'grade4') gradeName = "الصف الرابع الابتدائي";
                    if(g === 'grade5') gradeName = "الصف الخامس الابتدائي";
                    if(g === 'grade6') gradeName = "الصف السادس الابتدائي";
                } else if(stage === 'prep') {
                    if(g === 'grade1') gradeName = "الصف الأول الإعدادي";
                    if(g === 'grade2') gradeName = "الصف الثاني الإعدادي";
                    if(g === 'grade3') gradeName = "الصف الثالث الإعدادي";
                } else if(stage === 'secondary') {
                    gradeName = "الصف الأول الثانوي";
                }

                let opt = document.createElement('option');
                opt.value = g;
                opt.innerHTML = gradeName;
                gradeSelect.appendChild(opt);
            }
        } else {
            gradeGroup.classList.add('hidden');
        }
    }

    function updateGroups() {
        const region = document.getElementById('regionSelect').value;
        const stage = document.getElementById('stageSelect').value;
        const grade = document.getElementById('gradeSelect').value;
        const groupSelect = document.getElementById('groupSelect');
        const groupSelectionGroup = document.getElementById('groupSelectionGroup');

        groupSelect.innerHTML = '<option value="">-- اضغط للاختيار --</option>';

        if (grade && scheduleData[region][stage][grade]) {
            groupSelectionGroup.classList.remove('hidden');
            const groups = scheduleData[region][stage][grade];

            groups.forEach((grp, index) => {
                let opt = document.createElement('option');
                opt.value = index;
                opt.innerHTML = grp.name;
                groupSelect.appendChild(opt);
            });
        } else {
            groupSelectionGroup.classList.add('hidden');
        }
    }

    document.getElementById('registrationForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        
        const name = document.getElementById('studentName').value;
        const sPhone = document.getElementById('studentPhone').value;
        const pPhone = document.getElementById('parentPhone').value;
        const region = document.getElementById('regionSelect').value;
        const stage = document.getElementById('stageSelect').value;
        const grade = document.getElementById('gradeSelect').value;
        const groupIdx = document.getElementById('groupSelect').value;

        const selectedGroupObj = scheduleData[region][stage][grade][groupIdx];

        // الحفظ في سوبا بيس (استبدل 'registrations' باسم الجدول الفعلي لديك إذا اختلف)
        try {
            const { data, error } = await _supabase
                .from('registrations')
                .insert([
                    { 
                        student_name: name, 
                        student_phone: sPhone, 
                        parent_phone: pPhone, 
                        region: region, 
                        stage: stage, 
                        grade: grade, 
                        selected_schedule: selectedGroupObj.schedule 
                    }
                ]);

            if (error) {
                console.error('خطأ في حفظ البيانات:', error);
            }
        } catch (err) {
            console.error('Exception:', err);
        }

        // إخفاء النموذج وإظهار موعد الطالب المخصص فقط
        document.getElementById('registrationForm').style.display = 'none';
        document.getElementById('resName').innerText = name;
        document.getElementById('resSchedule').innerText = selectedGroupObj.schedule;
        document.getElementById('resultBox').classList.remove('hidden');
    });
</script>

</body>
</html>
