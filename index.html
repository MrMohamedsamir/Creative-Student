<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creative Student - تسجيل مواعيد دروس استاذ محمد سمير</title>
    <!-- مكتبة Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --primary-color: #00e5ff;
            --bg-color: #0b1329;
            --card-bg: #111a3a;
            --text-color: #ffffff;
            --border-color: #00e5ff55;
        }
        body {
            font-family: 'Cairo', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            direction: rtl;
            text-align: right;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: var(--card-bg);
            border: 2px solid var(--border-color);
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 0 20px rgba(0, 229, 255, 0.2);
            text-align: center;
        }
        .profile-img {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid var(--primary-color);
            box-shadow: 0 0 15px rgba(0, 229, 255, 0.4);
            margin-bottom: 15px;
        }
        h2 {
            color: var(--primary-color);
            margin-bottom: 15px;
            font-size: 20px;
        }
        .platform-brand {
            font-size: 19px;
            font-weight: bold;
            color: #fff;
            margin-bottom: 8px;
        }
        .contact-number {
            font-size: 18px;
            color: var(--primary-color);
            margin-bottom: 25px;
            direction: ltr;
            font-weight: bold;
        }
        .form-group {
            margin-bottom: 20px;
            text-align: right;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: var(--primary-color);
        }
        input, select {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            background: #0b1329;
            color: #fff;
            font-size: 16px;
            box-sizing: border-box;
            text-align: right;
        }
        input:focus, select:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 10px rgba(0, 229, 255, 0.4);
        }
        button {
            width: 100%;
            padding: 14px;
            background: var(--primary-color);
            color: #0b1329;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }
        button:hover {
            background: #00b8d4;
            box-shadow: 0 0 15px rgba(0, 229, 255, 0.6);
        }
        .hidden {
            display: none !important;
        }
        .success-box {
            background: rgba(0, 229, 255, 0.1);
            border: 2px solid var(--primary-color);
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            margin-top: 20px;
        }
        .success-box h3 {
            color: var(--primary-color);
            margin-top: 0;
        }
    </style>
</head>
<body>

<div class="container">
    <!-- الصورة الشخصية -->
    <img src="الصورة.jpg" alt="مستر محمد سمير" class="profile-img">
    
    <div class="platform-brand">تسجيل مواعيد دروس استاذ محمد سمير - Creative Student</div>
    <div class="contact-number">📞 01024417434</div>
    <h2>اختر بياناتك بعناية للتسجيل</h2>
    
    <form id="registrationForm">
        <!-- البيانات الأساسية -->
        <div class="form-group">
            <label for="studentName">اسم الطالب:</label>
            <input type="text" id="studentName" required placeholder="أدخل اسم الطالب رباعي">
        </div>

        <div class="form-group">
            <label for="studentPhone">رقم موبايل الطالب:</label>
            <input type="tel" id="studentPhone" required placeholder="01xxxxxxxx0">
        </div>

        <div class="form-group">
            <label for="parentPhone">رقم موبايل ولي الأمر:</label>
            <input type="tel" id="parentPhone" required placeholder="01xxxxxxxx0">
        </div>

        <!-- اختيار المنطقة -->
        <div class="form-group">
            <label for="regionSelect">اختر المنطقة:</label>
            <select id="regionSelect" required onchange="filterOptions()">
                <option value="">-- اختر المنطقة --</option>
                <option value="fowwa">مدينة فوة</option>
                <option value="al_alawi">منطقة العلوي</option>
            </select>
        </div>

        <!-- اختيار الصف الدراسي -->
        <div class="form-group">
            <label for="gradeSelect">الصف الدراسي:</label>
            <select id="gradeSelect" required onchange="filterOptions()">
                <option value="">-- اختر الصف الدراسي --</option>
                <option value="p4">الصف الرابع الابتدائي</option>
                <option value="p5">الصف الخامس الابتدائي</option>
                <option value="p6">الصف السادس الابتدائي</option>
                <option value="prep1">الصف الأول الإعدادي</option>
                <option value="prep2">الصف الثاني الإعدادي</option>
                <option value="prep3">الصف الثالث الإعدادي</option>
                <option value="sec1">الصف الأول الثانوي</option>
            </select>
        </div>

        <!-- اختيار المجموعة/الموعد (بالأيام والساعات الكاملة) -->
        <div class="form-group">
            <label for="groupSelect">المجموعة / الموعد المتاح:</label>
            <select id="groupSelect" required>
                <option value="">-- اختر المنطقة والصف أولاً لعرض المواعيد --</option>
            </select>
        </div>

        <button type="submit" id="submitBtn">تأكيد التسجيل</button>
    </form>

    <div id="resultBox" class="hidden success-box">
        <h3>تم التسجيل بنجاح! 🎉</h3>
        <p><strong>اسم الطالب:</strong> <span id="resName"></span></p>
        <p><strong>الموعد المحدد لك:</strong></p>
        <p id="resSchedule" style="font-size: 18px; color: var(--primary-color); font-weight: bold;"></p>
        <p>نتمنى لك التوفيق،، استاذ محمد سمير</p>
    </div>
</div>

<script>
    const SUPABASE_URL = 'YOUR_SUPABASE_URL';
    const SUPABASE_ANON_KEY = 'YOUR_SUPABASE_ANON_KEY';
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // جدول المواعيد كاملة بالأيام والساعات الدقيقة
    const scheduleDatabase = {
        fowwa: {
            p4: [
                "المجموعة (1): السبت والثلاثاء الساعة 3:00 عصراً",
                "المجموعة (2): الإثنين والأربعاء الساعة 6:00 مساءً"
            ],
            p5: [
                "المجموعة (1): السبت والثلاثاء الساعة 4:00 عصراً",
                "المجموعة (2): الإثنين والأربعاء الساعة 5:00 عصراً"
            ],
            p6: [
                "المجموعة (1): السبت والثلاثاء الساعة 2:00 ظهراً",
                "المجموعة (2): الإثنين والأربعاء الساعة 7:00 مساءً"
            ],
            prep1: [
                "مجموعة البنات: السبت والثلاثاء الساعة 6:00 مساءً",
                "مجموعة البنين: السبت والثلاثاء الساعة 7:00 مساءً"
            ],
            prep2: [
                "مجموعة البنات: السبت والثلاثاء الساعة 5:00 عصراً",
                "مجموعة البنين: السبت والثلاثاء الساعة 8:00 مساءً"
            ],
            prep3: [
                "المجموعة العامة: السبت الساعة 12:00 ظهراً + الإثنين والأربعاء الساعة 3:00 عصراً"
            ],
            sec1: [
                "ننتظر مناهج الصف الأول الثانوي لتحديد المواعيد والساعات"
            ]
        },
        al_alawi: {
            p4: ["مجموعة الصف الرابع: الأحد والخميس الساعة 2:00 ظهراً"],
            p5: ["مجموعة الصف الخامس: الأحد والخميس الساعة 3:00 عصراً"],
            p6: ["مجموعة الصف السادس: الأحد والخميس الساعة 4:00 عصراً"],
            prep1: ["مجموعة الصف الأول الإعدادي: الأحد والخميس الساعة 5:00 عصراً"]
        }
    };

    function filterOptions() {
        const region = document.getElementById('regionSelect').value;
        const grade = document.getElementById('gradeSelect').value;
        const groupSelect = document.getElementById('groupSelect');

        groupSelect.innerHTML = '';

        if (!region || !grade) {
            groupSelect.innerHTML = '<option value="">-- اختر المنطقة والصف أولاً لعرض المواعيد --</option>';
            return;
        }

        if (scheduleDatabase[region] && scheduleDatabase[region][grade]) {
            const availableSchedules = scheduleDatabase[region][grade];
            availableSchedules.forEach(item => {
                let opt = document.createElement('option');
                opt.value = item;
                opt.innerText = item;
                groupSelect.appendChild(opt);
            });
        } else {
            groupSelect.innerHTML = '<option value="">لا توجد مواعيد متاحة لهذا الصف في هذه المنطقة حالياً</option>';
        }
    }

    document.getElementById('registrationForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        
        const name = document.getElementById('studentName').value;
        const sPhone = document.getElementById('studentPhone').value;
        const pPhone = document.getElementById('parentPhone').value;
        const regionText = document.getElementById('regionSelect').options[document.getElementById('regionSelect').selectedIndex].text;
        const gradeText = document.getElementById('gradeSelect').options[document.getElementById('gradeSelect').selectedIndex].text;
        const selectedSchedule = document.getElementById('groupSelect').value;

        try {
            await _supabase
                .from('registrations')
                .insert([
                    { 
                        student_name: name, 
                        student_phone: sPhone, 
                        parent_phone: pPhone, 
                        region: regionText, 
                        grade: gradeText, 
                        selected_schedule: selectedSchedule 
                    }
                ]);
        } catch (err) {
            console.log(err);
        }

        document.getElementById('registrationForm').style.display = 'none';
        document.getElementById('resName').innerText = name;
        document.getElementById('resSchedule').innerText = `${gradeText} — ${selectedSchedule}`;
        document.getElementById('resultBox').classList.remove('hidden');
    });
</script>

</body>
</html>
