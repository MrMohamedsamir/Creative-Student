<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>استمارة تسجيل الطلاب - أ/ محمد سمير</title>
    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- Font Awesome الأيقونات -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- خط Cairo -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Cairo', sans-serif;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #0b0f19;
            background-image: radial-gradient(circle at 50% 0%, #111d2e 0%, #0b0f19 75%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            color: #ffffff;
        }

        .card {
            background: #111827;
            width: 100%;
            max-width: 520px;
            border-radius: 20px;
            border: 1px solid rgba(6, 182, 212, 0.2);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.7), 0 0 20px rgba(6, 182, 212, 0.15);
            overflow: hidden;
            position: relative;
        }

        .header {
            background: linear-gradient(180deg, #1f2937 0%, #111827 100%);
            padding: 30px 20px 20px 20px;
            text-align: center;
            border-bottom: 2px solid #06b6d4;
        }

        .teacher-img {
            width: 105px;
            height: 105px;
            border-radius: 50%;
            border: 3px solid #06b6d4;
            object-fit: cover;
            margin-bottom: 12px;
            box-shadow: 0 0 15px rgba(6, 182, 212, 0.4);
        }

        .header h1 {
            font-size: 25px;
            font-weight: 900;
            color: #06b6d4;
            margin-bottom: 4px;
            text-shadow: 0 0 10px rgba(6, 182, 212, 0.3);
        }

        .header p {
            font-size: 14px;
            color: #9ca3af;
            font-weight: 600;
        }

        .phone-contact {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(6, 182, 212, 0.1);
            border: 1px solid #06b6d4;
            padding: 6px 18px;
            border-radius: 50px;
            margin-top: 12px;
            font-size: 14px;
            font-weight: 800;
            color: #06b6d4;
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .phone-contact:hover {
            background: #06b6d4;
            color: #111827;
            box-shadow: 0 0 12px rgba(6, 182, 212, 0.5);
        }

        form {
            padding: 25px;
        }

        .form-group {
            margin-bottom: 18px;
        }

        label {
            display: block;
            font-weight: 700;
            margin-bottom: 8px;
            color: #e5e7eb;
            font-size: 14px;
        }

        input, select {
            width: 100%;
            padding: 12px 15px;
            background-color: #1f2937;
            border: 1.5px solid #374151;
            border-radius: 10px;
            font-size: 14px;
            color: #ffffff;
            transition: all 0.3s ease;
            outline: none;
        }

        input::placeholder {
            color: #6b7280;
        }

        input:focus, select:focus {
            border-color: #06b6d4;
            background-color: #111827;
            box-shadow: 0 0 10px rgba(6, 182, 212, 0.3);
        }

        select option {
            background-color: #1f2937;
            color: #ffffff;
        }

        .form-row {
            display: flex;
            gap: 15px;
        }

        .form-row .form-group {
            flex: 1;
        }

        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #06b6d4 0%, #0891b2 100%);
            border: none;
            border-radius: 10px;
            color: #0f172a;
            font-size: 18px;
            font-weight: 900;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(6, 182, 212, 0.4);
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        button:hover {
            background: linear-gradient(135deg, #22d3ee 0%, #06b6d4 100%);
            box-shadow: 0 0 20px rgba(6, 182, 212, 0.6);
            transform: translateY(-2px);
        }

        button:disabled {
            background: #4b5563;
            color: #9ca3af;
            cursor: not-allowed;
            box-shadow: none;
            transform: none;
        }

        .alert {
            padding: 12px 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-weight: 700;
            text-align: center;
            font-size: 14px;
            display: none;
        }

        .alert-success {
            background-color: rgba(16, 185, 129, 0.2);
            color: #34d399;
            border: 1px solid #10b981;
        }

        .alert-error {
            background-color: rgba(239, 68, 68, 0.2);
            color: #f87171;
            border: 1px solid #ef4444;
        }

        #scheduleContainer {
            display: none;
            padding: 20px;
            text-align: center;
            border-top: 1px solid #374151;
            background: #0f172a;
        }

        #scheduleContainer h3 {
            color: #06b6d4;
            margin-bottom: 8px;
        }

        #scheduleContainer p {
            font-size: 13px;
            color: #9ca3af;
            margin-bottom: 12px;
        }

        #scheduleContainer img {
            width: 100%;
            border-radius: 10px;
            border: 2px solid #06b6d4;
            box-shadow: 0 0 15px rgba(6, 182, 212, 0.3);
        }

        @media (max-width: 480px) {
            .form-row {
                flex-direction: column;
                gap: 0;
            }
        }
    </style>
</head>
<body>

<div class="card">
    <div class="header">
        <!-- تم ضبط اسم الصورة هنا ليتطابق مع اسم "الصورة" على جيت هاب -->
        <img src="الصورة.jpg" alt="أستاذ محمد سمير" class="teacher-img">
        <h1>أ / محمد سمير</h1>
        <p>منصة Creative Student التعليمية</p>
        <a href="tel:01024417434" class="phone-contact">
            <i class="fa-solid fa-phone"></i> 01024417434
        </a>
    </div>

    <form id="studentForm">
        <div id="alertBox" class="alert"></div>

        <div class="form-group">
            <label>اسم الطالب رباعي *</label>
            <input type="text" id="full_name" required placeholder="أدخل اسم الطالب الكامل">
        </div>

        <div class="form-row">
            <div class="form-group">
                <label>رقم هاتف الطالب *</label>
                <input type="tel" id="student_phone" required placeholder="01xxxxxxxxx">
            </div>
            <div class="form-group">
                <label>رقم ولي الأمر *</label>
                <input type="tel" id="parent_phone" required placeholder="01xxxxxxxxx">
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label>الصف الدراسي *</label>
                <select id="grade" required>
                    <option value="">اختر الصف الدراسي</option>
                    <option value="الصف الرابع الابتدائي">الصف الرابع الابتدائي</option>
                    <option value="الصف الخامس الابتدائي">الصف الخامس الابتدائي</option>
                    <option value="الصف السادس الابتدائي">الصف السادس الابتدائي</option>
                    <option value="الصف الأول الاعدادي بنين">الصف الأول الاعدادي بنين</option>
                    <option value="الصف الأول الاعدادي بنات">الصف الأول الاعدادي بنات</option>
                    <option value="الصف الثاني الاعدادي بنين">الصف الثاني الاعدادي بنين</option>
                    <option value="الصف الثاني الاعدادي بنات">الصف الثاني الاعدادي بنات</option>
                    <option value="الصف الثالث الاعدادي">الصف الثالث الاعدادي</option>
                </select>
            </div>
            <div class="form-group">
                <label>اختر أيام المجموعة *</label>
                <select id="group_name" required>
                    <option value="">اختر أيام المجموعة</option>
                    <option value="مجموعة 1 (السبت والثلاثاء)">مجموعة 1 (السبت والثلاثاء)</option>
                    <option value="مجموعة 2 (الأحد والأربعاء)">مجموعة 2 (الأحد والأربعاء)</option>
                    <option value="مجموعة 3 (الإثنين والخميس)">مجموعة 3 (الإثنين والخميس)</option>
                </select>
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label>الفترة الدراسية *</label>
                <select id="period_type" required>
                    <option value="">اختر الفترة</option>
                    <option value="صباحي">صباحي</option>
                    <option value="مسائي">مسائي</option>
                </select>
            </div>
            <div class="form-group">
                <label>مقر المجموعة *</label>
                <select id="location_group" required>
                    <option value="">اختر المقر</option>
                    <option value="مجموعة فوه">مجموعة فوه</option>
                    <option value="مجموعة العلوي">مجموعة العلوي</option>
                </select>
            </div>
        </div>

        <button type="submit" id="submitBtn">تأكيد وتسجيل البيانات 🚀</button>
    </form>

    <div id="scheduleContainer">
        <h3>🗓️ جدول المواعيد المتاحة</h3>
        <p>يرجى حفظ صورة الجدول أو التقاط لقطة شاشة (Screenshot)</p>
        <!-- تم ضبط اسم صورة الجدول هنا ليتطابق مع اسم "المواعيد" على جيت هاب -->
        <img src="المواعيد.jpg" alt="جدول المواعيد">
    </div>
</div>

<script>
    const SUPABASE_URL = 'https://djpffvgmhjixpmakprhj.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_AltX7JCFt9aMi80RzLdd5g_YvhZ7cVl';

    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const form = document.getElementById('studentForm');
    const submitBtn = document.getElementById('submitBtn');
    const alertBox = document.getElementById('alertBox');
    const scheduleContainer = document.getElementById('scheduleContainer');

    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        
        submitBtn.disabled = true;
        submitBtn.innerText = 'جاري التسجيل وإرسال البيانات...';
        alertBox.style.display = 'none';

        const period = document.getElementById('period_type').value;
        const location = document.getElementById('location_group').value;

        const studentData = {
            full_name: document.getElementById('full_name').value.trim(),
            student_phone: document.getElementById('student_phone').value.trim(),
            parent_phone: document.getElementById('parent_phone').value.trim(),
            grade: document.getElementById('grade').value,
            group_name: document.getElementById('group_name').value,
            notes: `المقر: ${location} | الفترة: ${period}`
        };

        try {
            const { data, error } = await supabaseClient
                .from('students')
                .insert([studentData]);

            if (error) throw error;

            showAlert('تم تسجيل البيانات بنجاح! 🎉 نتمنى لك التوفيق.', 'success');
            form.reset();
            
            scheduleContainer.style.display = 'block';
            scheduleContainer.scrollIntoView({ behavior: 'smooth' });

        } catch (error) {
            console.error('Error:', error);
            showAlert('حدث خطأ أثناء التسجيل: ' + (error.message || 'يرجى إعادة المحاولة'), 'error');
        } finally {
            submitBtn.disabled = false;
            submitBtn.innerText = 'تأكيد وتسجيل البيانات 🚀';
        }
    });

    function showAlert(message, type) {
        alertBox.innerText = message;
        alertBox.className = 'alert alert-' + type;
        alertBox.style.display = 'block';
    }
</script>

</body>
</html>
