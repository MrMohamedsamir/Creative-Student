<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الطلاب - Creative Student</title>
    <!-- Supabase JS Client -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            background: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 500px;
        }
        h2 {
            text-align: center;
            color: #333;
            margin-bottom: 25px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 6px;
            color: #555;
            font-weight: bold;
        }
        input, select, textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 14px;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #28a745;
            border: none;
            color: white;
            font-size: 16px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            margin-top: 10px;
            transition: background 0.3s;
        }
        button:hover {
            background-color: #218838;
        }
        .message {
            margin-top: 15px;
            padding: 10px;
            border-radius: 6px;
            display: none;
            text-align: center;
            font-weight: bold;
        }
        .success {
            background-color: #d4edda;
            color: #155724;
        }
        .error {
            background-color: #f8d7da;
            color: #721c24;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>استمارة تسجيل الطالب</h2>
    <form id="studentForm">
        <div class="form-group">
            <label>اسم الطالب رباعي:</label>
            <input type="text" id="full_name" required placeholder="أدخل اسمك الكامل">
        </div>

        <div class="form-group">
            <label>رقم هاتف الطالب:</label>
            <input type="tel" id="student_phone" required placeholder="01xxxxxxxxx">
        </div>

        <div class="form-group">
            <label>رقم هاتف ولي الأمر:</label>
            <input type="tel" id="parent_phone" required placeholder="01xxxxxxxxx">
        </div>

        <div class="form-group">
            <label>الصف الدراسي:</label>
            <select id="grade" required>
                <option value="">اختر الصف الدراسي</option>
                <option value="الأول الثانوي">الأول الثانوي</option>
                <option value="الثاني الثانوي">الثاني الثانوي</option>
                <option value="الثالث الثانوي">الثالث الثانوي</option>
            </select>
        </div>

        <div class="form-group">
            <label>اسم المجموعة:</label>
            <input type="text" id="group_name" required placeholder="مثال: مجموعة A">
        </div>

        <div class="form-group">
            <label>الموعد / الفترة:</label>
            <input type="text" id="period" required placeholder="مثال: السبت والإثنين 4 عصراً">
        </div>

        <div class="form-group">
            <label>المدينة / المركز:</label>
            <input type="text" id="city" required placeholder="أدخل مدينتك">
        </div>

        <div class="form-group">
            <label>المدرسة (اختياري):</label>
            <input type="text" id="school" placeholder="أدخل اسم مدرستك">
        </div>

        <div class="form-group">
            <label>ملاحظات (اختياري):</label>
            <textarea id="notes" rows="3" placeholder="أي ملاحظات إضافية"></textarea>
        </div>

        <button type="submit" id="submitBtn">تسجيل البيانات</button>
    </form>

    <div id="statusMessage" class="message"></div>
</div>

<script>
    // إعدادات الاتصال بـ Supabase
    const SUPABASE_URL = 'https://djpffvgmhjixpmakprhj.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_AltX7JCFt9aMi80RzLdd5g_YvhZ7cVl';

    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const form = document.getElementById('studentForm');
    const submitBtn = document.getElementById('submitBtn');
    const statusMessage = document.getElementById('statusMessage');

    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        
        submitBtn.disabled = true;
        submitBtn.innerText = 'جاري الإرسال...';
        statusMessage.style.display = 'none';

        const studentData = {
            full_name: document.getElementById('full_name').value,
            student_phone: document.getElementById('student_phone').value,
            parent_phone: document.getElementById('parent_phone').value,
            grade: document.getElementById('grade').value,
            group_name: document.getElementById('group_name').value,
            period: document.getElementById('period').value,
            city: document.getElementById('city').value,
            school: document.getElementById('school').value || null,
            notes: document.getElementById('notes').value || null
        };

        try {
            const { data, error } = await supabaseClient
                .from('students')
                .insert([studentData]);

            if (error) throw error;

            statusMessage.className = 'message success';
            statusMessage.innerText = 'تم تسجيل البيانات بنجاح! 🎉';
            statusMessage.style.display = 'block';
            form.reset();
        } catch (error) {
            console.error('Error:', error);
            statusMessage.className = 'message error';
            statusMessage.innerText = 'حدث خطأ أثناء التسجيل: ' + error.message;
            statusMessage.style.display = 'block';
        } finally {
            submitBtn.disabled = false;
            submitBtn.innerText = 'تسجيل البيانات';
        }
    });
</script>

</body>
</html>
